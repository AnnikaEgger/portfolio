<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Policy</title>

    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/assets.css" />
    <link rel="stylesheet" href="./styles/legal.css" />

    <link rel="stylesheet" href="./style.css" />

    <script src="./scripts/privacy-policy.js"></script>
    <script src="./script.js" defer></script>
  </head>
  <body onload="initPrivacyPolicy()" class="body--legal">
    <header class="site-header">
      <div class="header-content">
        <a href="#" class="logo logo-name--header">
          <div class="logo-right">
            <img
              class="logo-initials"
              src="./assets/img/logo-initials.png"
              alt=""
            />
          </div>
        </a>

        <div class="header-controls">
          <nav class="header-nav">
            <ul>
              <li>
                <a
                  onclick="changeActiveHeaderLink(event)"
                  class="header-link"
                  data-section="header"
                  data-key="about"
                  href="index.html#about-me-section"
                  >About me</a
                >
              </li>
              <li>
                <a
                  onclick="changeActiveHeaderLink(event)"
                  class="header-link"
                  data-section="header"
                  data-key="skills"
                  href="index.html#my-skills-section"
                  >Skills</a
                >
              </li>
              <li>
                <a
                  onclick="changeActiveHeaderLink(event)"
                  class="header-link"
                  data-section="header"
                  data-key="portfolio"
                  href="index.html#portfolio-section"
                  >Portfolio</a
                >
              </li>
            </ul>
          </nav>

          <div class="language-switch">
            <button
              onclick="selectLanguage('german', 'privacy-policy')"
              id="de-btn"
              class="btn btn-header btn-primary1--outline"
            >
              DE
            </button>
            <button
              onclick="selectLanguage('english', 'privacy-policy')"
              id="en-btn"
              class="btn btn-header btn-primary1--outline"
            >
              EN
            </button>
          </div>
        </div>

        <div id="burger-menu-header" class="burger-menu-header">
          <input
            class="burger-menu-hidden-checkbox"
            type="checkbox"
            name=""
            id="burger-menu-hidden-checkbox"
          />
          <div class="burger-menu-line burger-menu-line-1"></div>
          <div class="burger-menu-line burger-menu-line-2"></div>
          <div class="burger-menu-line burger-menu-line-3"></div>
        </div>
      </div>

      <div class="mobile-menu-wrapper">
        <nav class="mobile-menu">
          <ul>
            <li>
              <a
                onclick="closeMobileMenu()"
                class="link-mobile-menu-active"
                href="privacy-policy#about-me-section"
                data-section="burger_menu"
                data-key="about"
                >About me</a
              >
            </li>
            <li>
              <a
                onclick="closeMobileMenu()"
                href="privacy-policy#my-skills-section"
                data-section="burger_menu"
                data-key="skills"
                >My skills</a
              >
            </li>
            <li>
              <a
                onclick="closeMobileMenu()"
                href="privacy-policy#portfolio-section"
                data-section="burger_menu"
                data-key="portfolio"
                >Portfolio</a
              >
            </li>
            <li>
              <a
                onclick="closeMobileMenu()"
                href="privacy-policy#contact-section"
                data-section="burger_menu"
                data-key="contact"
                >Contact</a
              >
            </li>
            <li>
              <div class="language-btns-mobile">
                <button class="language-btn-mobile language-btn-mobile-active">
                  EN
                </button>
                <span> / </span>
                <button class="language-btn-mobile">DE</button>
              </div>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="mobile-menu-wrapper">
      <nav class="mobile-menu">
        <ul>
          <li>
            <a class="link-mobile-menu-active" href="#about-me-section"
              >About me</a
            >
          </li>
          <li>
            <a href="#my-skills-section">My skills</a>
          </li>
          <li>
            <a href="#portfolio-section">Portfolio</a>
          </li>
          <li>
            <a href="#contact-section">Contact</a>
          </li>
          <li>
            <div class="language-btns-mobile">
              <button class="language-btn-mobile language-btn-mobile-active">
                EN
              </button>
              <span> / </span>
              <button class="language-btn-mobile">DE</button>
            </div>
          </li>
        </ul>
      </nav>
    </div>

    <main>
      <div class="top-wrapper">
        <a href="./index.html" class="go-back-btn">
          <svg
            width="39"
            height="39"
            viewBox="0 0 39 39"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect
              x="1"
              y="38"
              width="37"
              height="37"
              rx="18.5"
              transform="rotate(-90 1 38)"
              stroke="rgba(0, 190, 232, 1)"
              stroke-width="2"
            />
            <path
              d="M15.828 21L20.485 25.657C20.8755 26.0475 20.8755 26.6806 20.485 27.071C20.0945 27.4615 19.4615 27.4615 19.071 27.071L12.7071 20.7072C12.3166 20.3166 12.3166 19.6835 12.7071 19.2929L19.071 12.929C19.4615 12.5386 20.0945 12.5386 20.485 12.929C20.8755 13.3195 20.8755 13.9526 20.485 14.343L15.828 19L27 19C27.5523 19 28 19.4478 28 20C28 20.5523 27.5523 21 27 21L15.828 21Z"
              fill="rgba(0, 190, 232, 1)"
            />
          </svg>
        </a>

        <div class="headline-wrapper--legal">
          <svg
            class="legal-line-left"
            width="100"
            height="4"
            viewBox="0 0 100 4"
            preserveAspectRatio="none"
          >
            <line
              x1="2"
              y1="2"
              x2="100"
              y2="2"
              stroke-linecap="round"
              vector-effect="non-scaling-stroke"
            />
          </svg>

          <h1 class="legal-h1" id="privacy-policy-h1">Privacy Policy</h1>

          <svg
            class="legal-line-right"
            height="4"
            viewBox="0 0 100 4"
            preserveAspectRatio="none"
          >
            <line
              x1="0"
              y1="2"
              x2="100"
              y2="2"
              stroke-linecap="round"
              vector-effect="non-scaling-stroke"
            />
          </svg>
        </div>
      </div>

      <div class="content-wrapper" id="content-wrapper-privacy-policy"></div>
    </main>

    <footer class="site-footer">
      <a href="#" class="logo-name logo-name--footer">
        <span class="bracket letter-colored1">&#123;</span>
        <span class="letter">A</span><span class="letter">n</span
        ><span class="letter">n</span
        ><span class="letter letter-colored1">;</span
        ><span class="letter">k</span
        ><span class="letter letter-colored2">a</span>
        <span class="bracket letter-colored1">&#125;</span>
      </a>

      <p class="footer-copyright">© Annika Egger 2026</p>

      <div class="footer-social-btns">
        <a
          target="_blank"
          href="https://github.com/AnnikaEgger"
          class="social-btn"
        >
          <img src="./assets/icons/github.svg" alt="Github Logo" />
        </a>

        <a href="mailto:kontakt@annika-egger.de" class="social-btn">
          <img src="./assets/icons/mail.svg" alt="Email Logo" />
        </a>

        <a
          target="_blank"
          href="https://www.linkedin.com/in/annika-egger-705230406/"
          class="social-btn"
        >
          <img src="./assets/icons/linkedin.svg" alt="LinkedIn Logo" />
        </a>
      </div>

      <a
        class="legal-notice-footer"
        href="./legal-notice.html"
        data-section="footer"
        data-key="legal_notice"
        >Legal Notice</a
      >
    </footer>
  </body>
</html>
